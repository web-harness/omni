language: rust
layer: application
stack: frontend

dependsOn:
  - omni-glue
  - omni-deepagents
  - omni-util
  - omni-docxjs
  - omni-dicebear
  - omni-dock
  - omni-marked
  - omni-monaco
  - omni-pdfjs
  - omni-pptx-renderer
  - omni-plyr
  - omni-popper
  - omni-pretext
  - omni-sheetjs
  - omni-inference
  - omni-sw
  - omni-zenfs
  - omni-bashkit

tasks:
  build:
    command: dx
    args:
      - bundle
      - --platform
      - web
      - --out-dir
      - dist
    deps:
      - omni-util:build
      - omni-docxjs:build
      - omni-dicebear:build
      - omni-dock:build
      - omni-popper:build
      - omni-marked:build
      - omni-monaco:build
      - omni-pdfjs:build
      - omni-pptx-renderer:build
      - omni-plyr:build
      - omni-pretext:build
      - omni-sheetjs:build
      - omni-zenfs:build
      - omni-zenfs:build-wasm
      - omni-deepagents:build
      - omni-bashkit:build
      - omni-inference:build-main
      - omni-inference:build-client
      - omni-inference:build-register
      - omni-inference:copy-wasm
      - omni-sw:build-main
      - omni-sw:build-register
      - omni-sw:copy-sql-wasm
    inputs:
      - '@group(sources)'
      - '@group(configs)'
    outputs:
      - dist/
    toolchains:
      - system
  prepare-pages-assets:
    command: shx
    args:
      - echo
      - pages-assets-ready
    deps:
      - omni-util:build
      - omni-docxjs:build
      - omni-dicebear:build
      - omni-dock:build
      - omni-popper:build
      - omni-marked:build
      - omni-monaco:build
      - omni-pdfjs:build
      - omni-pptx-renderer:build
      - omni-plyr:build
      - omni-pretext:build
      - omni-sheetjs:build
      - omni-zenfs:build
      - omni-zenfs:build-wasm
      - omni-deepagents:build
      - omni-bashkit:build
      - omni-inference:build-main
      - omni-inference:build-client
      - omni-inference:build-register
      - omni-inference:copy-wasm
      - omni-sw:build-main
      - omni-sw:build-register
      - omni-sw:copy-sql-wasm
    inputs:
      - '@group(sources)'
      - '@group(configs)'
    options:
      internal: true
      runFromWorkspaceRoot: true
    toolchains:
      - system
  build-pages-debug:
    command: dx
    args:
      - bundle
      - --platform
      - web
      - --base-path
      - /omni/app
      - --out-dir
      - ../target/dx/omni-ui/dist-pages-snippets-debug
    deps:
      - prepare-pages-assets
    inputs:
      - '@group(sources)'
      - '@group(configs)'
    outputs:
      - /target/dx/omni-ui/dist-pages-snippets-debug/
    options:
      internal: true
    toolchains:
      - system
  build-pages-release:
    command: dx
    args:
      - bundle
      - --platform
      - web
      - --release
      - --base-path
      - /omni/app
      - --out-dir
      - dist
    deps:
      - prepare-pages-assets
    inputs:
      - '@group(sources)'
      - '@group(configs)'
    outputs:
      - dist/
    options:
      internal: true
    toolchains:
      - system
  clean-pages-asset-snippets:
    command: shx
    args:
      - rm
      - -rf
      - omni-ui/dist/public/assets/snippets
    deps:
      - build-pages-release
    inputs:
      - '@group(configs)'
    options:
      internal: true
      runFromWorkspaceRoot: true
    toolchains:
      - system
  create-pages-asset-snippets:
    command: shx
    args:
      - mkdir
      - -p
      - omni-ui/dist/public/assets/snippets
    deps:
      - clean-pages-asset-snippets
      - build-pages-debug
    inputs:
      - '@group(configs)'
    options:
      internal: true
      runFromWorkspaceRoot: true
    toolchains:
      - system
  copy-pages-debug-snippets:
    command: shx
    args:
      - cp
      - -r
      - target/dx/omni-ui/debug/web/public/wasm/snippets/.
      - omni-ui/dist/public/assets/snippets
    deps:
      - create-pages-asset-snippets
    inputs:
      - '@group(configs)'
    options:
      internal: true
      runFromWorkspaceRoot: true
    toolchains:
      - system
  copy-pages-release-snippets:
    command: shx
    args:
      - cp
      - -r
      - target/dx/omni-ui/release/web/public/snippets/.
      - omni-ui/dist/public/assets/snippets
    deps:
      - create-pages-asset-snippets
    inputs:
      - '@group(configs)'
    options:
      internal: true
      runFromWorkspaceRoot: true
    toolchains:
      - system
  copy-pages-asset-runtime-modules:
    command: shx
    args:
      - cp
      - omni-ui/dist/public/omni-zenfs.js
      - omni-ui/dist/public/assets/omni-zenfs.js
    deps:
      - build-pages-release
    inputs:
      - '@group(configs)'
    options:
      internal: true
      runFromWorkspaceRoot: true
    toolchains:
      - system
  build-pages:
    command: shx
    args:
      - echo
      - pages-build-ready
    deps:
      - copy-pages-debug-snippets
      - copy-pages-release-snippets
      - copy-pages-asset-runtime-modules
    inputs:
      - '@group(sources)'
      - '@group(configs)'
    outputs:
      - dist/
    options:
      runFromWorkspaceRoot: true
    toolchains:
      - system
  build-native:
    command: dx
    args:
      - bundle
      - --platform
      - desktop
      - --out-dir
      - dist-native
    deps:
      - omni-util:build
      - omni-docxjs:build
      - omni-dicebear:build
      - omni-dock:build
      - omni-popper:build
      - omni-marked:build
      - omni-monaco:build
      - omni-pdfjs:build
      - omni-pptx-renderer:build
      - omni-plyr:build
      - omni-pretext:build
      - omni-sheetjs:build
      - omni-zenfs:build
      - omni-zenfs:build-wasm
      - omni-deepagents:build
      - omni-bashkit:build
      - omni-inference:build-main
      - omni-inference:build-client
      - omni-inference:build-register
      - omni-inference:copy-wasm
      - omni-sw:build-main
      - omni-sw:build-agent-module
      - omni-sw:build-register
      - omni-sw:copy-sql-wasm
    inputs:
      - '@group(sources)'
      - '@group(configs)'
    outputs:
      - dist-native/
    toolchains:
      - system
  dev:
    command: dx
    args:
      - serve
      - --platform
      - web
    deps:
      - omni-bashkit:build
      - omni-zenfs:build
      - omni-zenfs:build-wasm
      - omni-util:watch
      - omni-docxjs:watch
      - omni-dicebear:watch
      - omni-dock:watch
      - omni-popper:watch
      - omni-monaco:watch
      - omni-marked:watch
      - omni-pdfjs:watch
      - omni-pptx-renderer:watch
      - omni-plyr:watch
      - omni-pretext:watch
      - omni-sheetjs:watch
      - omni-zenfs:watch
      - omni-zenfs:watch-wasm
      - omni-deepagents:build
      - omni-inference:copy-wasm
      - omni-inference:watch-client
      - omni-inference:watch-main
      - omni-inference:watch-register
      - omni-sw:copy-sql-wasm
      - omni-sw:watch-main
      - omni-sw:watch-register
    preset: server
    toolchains:
      - system
  dev-native:
    command: dx
    args:
      - serve
      - --platform
      - desktop
    deps:
      - omni-bashkit:build
      - omni-zenfs:build
      - omni-zenfs:build-wasm
      - omni-util:watch
      - omni-docxjs:watch
      - omni-dicebear:watch
      - omni-dock:watch
      - omni-popper:watch
      - omni-monaco:watch
      - omni-marked:watch
      - omni-pdfjs:watch
      - omni-pptx-renderer:watch
      - omni-plyr:watch
      - omni-pretext:watch
      - omni-sheetjs:watch
      - omni-zenfs:watch
      - omni-zenfs:watch-wasm
      - omni-deepagents:build
      - omni-inference:copy-wasm
      - omni-inference:watch-client
      - omni-inference:watch-main
      - omni-inference:watch-register
      - omni-sw:copy-sql-wasm
      - omni-sw:watch-main
      - omni-sw:watch-agent-module
      - omni-sw:watch-register
    preset: server
    toolchains:
      - system
  test:
    command: cargo
    args:
      - test
      - -p
      - omni-ui
    inputs:
      - '@group(sources)'
      - '@group(tests)'
      - '@group(configs)'
    options:
      cache: false
      runFromWorkspaceRoot: true
  format-biome:
    command: biome
    args:
      - format
      - --write
      - .
    options:
      cache: false
      runFromWorkspaceRoot: true
  format-cargo:
    command: cargo
    args:
      - fmt
      - --all
    options:
      cache: false
      runFromWorkspaceRoot: true