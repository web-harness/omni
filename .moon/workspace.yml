versionConstraint: ">=2.0.0"
telemetry: false

projects:
  omni-ui: omni-ui
  omni-rt: omni-rt/crates/omni-rt
  omni-protocol: omni-rt/crates/omni-protocol
  omni-bashkit: omni-rt/crates/omni-bashkit
  omni-zenfs: omni-rt/crates/omni-zenfs
  omni-deepagents: omni-rt/crates/omni-deepagents
  omni-dock: omni-rt/packages/omni-dock
  omni-marked: omni-rt/packages/omni-marked
  omni-monaco: omni-rt/packages/omni-monaco
  omni-pdfjs: omni-rt/packages/omni-pdfjs
  omni-plyr: omni-rt/packages/omni-plyr
  omni-popper: omni-rt/packages/omni-popper
  omni-pretext: omni-rt/packages/omni-pretext
  omni-sw: omni-rt/packages/omni-sw
  omni-wc: omni-wc

vcs:
  provider: github
  defaultBranch: main

pipeline:
  installDependencies:
    - node
  logRunningCommand: true

hasher:
  ignorePatterns:
    - "**/dist/**/*"
    - "**/storybook-static/**/*"
    - "**/target/**/*"
    - "**/release/**/*"
    - "**/wasm-dev/**/*"
    - "**/node_modules/**/*"
    - "omni-ui/public/**/*"
  ignoreMissingPatterns:
    - "**/build.rs"
    - "**/build.ts"
    - "**/build.mjs"
    - "**/Cargo.toml"
    - "**/Dioxus.toml"
    - "**/clippy.toml"
    - "**/package.json"
    - "**/tsconfig.json"
    - "**/tsconfig.*.json"