name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install cargo-binstall
        uses: cargo-bins/cargo-binstall@main

      - name: Install Dioxus CLI
        run: cargo binstall dioxus-cli@0.7.4 --no-confirm

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            omni-wc/package-lock.json
            omni-rt/crates/omni-dock/package-lock.json
            omni-rt/crates/omni-popper/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Set Dioxus base_path for GH Pages
        run: sed -i '/\[web\.app\]/a base_path = "omni/app"' omni-ui/Dioxus.toml

      - name: Build Dioxus app
        run: npm run build:dx

      - name: Build Storybook
        run: BASE_PATH=/omni/ npm run wc:build

      - name: Assemble deploy directory
        run: |
          mkdir -p deploy/app
          cp -r omni-wc/storybook-static/* deploy/
          cp -r dist/public/* deploy/app/

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: deploy

      - id: deployment
        name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
