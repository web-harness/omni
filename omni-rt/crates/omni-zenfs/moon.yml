language: rust
layer: library
stack: systems

tasks:
  build:
    command: esbuild
    args:
      - src/omni-zenfs.ts
      - --bundle
      - --format=esm
      - --outfile=../../../omni-ui/public/omni-zenfs.js
    inputs:
      - src/omni-zenfs.ts
      - package.json
      - build.rs
      - Cargo.toml
    toolchains:
      - node
  watch:
    command: esbuild
    args:
      - src/omni-zenfs.ts
      - --bundle
      - --format=esm
      - --outfile=../../../omni-ui/public/omni-zenfs.js
      - --watch
    inputs:
      - src/omni-zenfs.ts
      - package.json
      - build.rs
      - Cargo.toml
    preset: server
    toolchains:
      - node
  test:
    command: cargo
    args:
      - test
      - -p
      - omni-zenfs
    inputs:
      - '@group(sources)'
      - '@group(tests)'
      - build.rs
      - src/omni-zenfs.ts
      - Cargo.toml
    options:
      cache: false
      runFromWorkspaceRoot: true